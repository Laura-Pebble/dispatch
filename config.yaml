topics:
  - name: "AI and Marketing"
    feeds:
      - https://martech.org/feed/
      - https://www.marketingaiinstitute.com/blog/rss.xml
      - https://contentmarketinginstitute.com/feed/
    max_articles: 5

  - name: "AI for Business"
    feeds:
      - https://www.theverge.com/rss/ai-artificial-intelligence/index.xml
      - https://www.technologyreview.com/feed/
      - https://www.artificialintelligence-news.com/feed/
      - https://hbr.org/feed
    max_articles: 5

  - name: "B2B Tech and Startups"
    feeds:
      - https://techcrunch.com/feed/
      - https://saastr.com/feed/
    max_articles: 5

# Web search queries (Gemini grounding) — positioning-aligned
search_queries:
  # Narrative 1: Fragmentation
  - "B2B marketing chaos inconsistent messaging"
  - "marketing team misalignment brand 2026"
  # Narrative 2: AI Trap
  - "AI marketing trap generic content"
  - "synthetic content B2B quality"
  # Narrative 3: Confidence Gap
  - "marketing built on assumptions B2B"
  - "strategy execution gap marketing"
  # Narrative 4: Buyer Intelligence
  - "buyer persona problems B2B"
  - "AI buyer simulation marketing"
  # Narrative 5: Humans + AI
  - "AI copilot marketing human oversight"
  # Narrative 6: fCMO
  - "fractional CMO AI tools 2026"
  # Narrative 7: AEO
  - "AEO answer engine optimization brand"
  - "machine readable brand AI"
  # Counter-narrative
  - "vibe marketing criticism B2B"
  # Competitors
  - "fractional CMO AI new entrant"

search_max_results: 5

# short (~2min) | medium (~5min) | deep (~10min)
recap_length: medium

# Microsoft Edge TTS voice — see https://github.com/nickmilo/edge-tts for full list
voice: en-US-GuyNeural

# Schedule (used by GitHub Actions — hour in UTC)
# 12 UTC = 7 AM ET / 8 AM ET during DST
schedule_hour_utc: 12

# Ntfy.sh push notification topic (pick something unique/private)
ntfy_topic: laura-morning-news
